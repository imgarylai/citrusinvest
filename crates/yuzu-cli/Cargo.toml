[package]
name = "yuzu-cli"
version = "0.1.0"
edition = "2021"

[lib]
name = "yuzu_cli"
path = "src/lib.rs"

[[bin]]
name = "yuzu-cli"
path = "src/main.rs"

[dependencies]
yuzu-core = { path = "../yuzu-core" }
yuzu-data = { path = "../yuzu-data" }
clap = { workspace = true }
rayon = { workspace = true }
