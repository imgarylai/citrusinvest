[package]
name = "yuzu-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "Native batch backtest runner CLI over a locally-synced price mirror."
publish = false

[lib]
name = "yuzu_cli"
path = "src/lib.rs"

[[bin]]
name = "yuzu-cli"
path = "src/main.rs"

[dependencies]
yuzu-core = { path = "../yuzu-core", version = "0.1.1" }
yuzu-data = { path = "../yuzu-data", version = "0.1.1" }
clap = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
