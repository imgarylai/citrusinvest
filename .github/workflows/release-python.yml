# Publish yuzu-backtest to PyPI via Trusted Publishing (OIDC — no API token).
#
# One-time setup on pypi.org (Account → Publishing → Add a pending publisher):
#   PyPI project name: yuzu-backtest
#   Owner:             imgarylai
#   Repository:        citrusinvest
#   Workflow name:     release-python.yml
#   Environment:       pypi
#
# Then release by pushing a tag: git tag yuzu-py-v0.1.0 && git push origin yuzu-py-v0.1.0
# (keep the tag version in sync with crates/yuzu-py/{Cargo,pyproject}.toml).
name: Release Python

on:
  push:
    tags: ["yuzu-py-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheel ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/yuzu-py
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/yuzu-py/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/yuzu-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/yuzu-py/dist

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
