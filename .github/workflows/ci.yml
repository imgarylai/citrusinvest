name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        # lib + bins only; test targets share helpers that trip dead_code under -D warnings
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Clippy (yuzu-data without default features / no parquet)
        run: cargo clippy -p yuzu-data --no-default-features -- -D warnings
      - name: Test (yuzu-data without default features / no parquet)
        run: cargo test -p yuzu-data --no-default-features

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage (fail under 95%)
        run: bash scripts/coverage.sh

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
      - name: Check against declared MSRV
        run: cargo check --workspace

  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/yuzu-py
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Lint (yuzu-py)
        run: |
          cargo fmt --manifest-path crates/yuzu-py/Cargo.toml -- --check
          cargo clippy --manifest-path crates/yuzu-py/Cargo.toml -- -D warnings
      - name: Build and install wheel
        run: |
          pip install maturin
          pip install ./crates/yuzu-py
      - name: Python tests
        run: python crates/yuzu-py/tests/test_yuzu.py
