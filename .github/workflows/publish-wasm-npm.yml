name: Publish WASM to npm

on:
  # Manual runs: pick which package(s) to publish.
  workflow_dispatch:
    inputs:
      package:
        description: which package to publish
        type: choice
        options: [lemon-wasm, yuzu-wasm, both]
        default: lemon-wasm
  # Automatic runs: release-plz.yml fires a workflow_dispatch of this file
  # (`gh workflow run … -f package=both`) right after it cuts a release, so
  # npm stays in lockstep with crates.io. Why dispatch and not workflow_call:
  # npm Trusted Publishing (OIDC) validates the *top-level* workflow file, so
  # a reusable-workflow invocation would present release-plz.yml and fail the
  # trusted-publisher check — and workflow_dispatch is one of the two
  # documented exceptions to the GITHUB_TOKEN recursion guard, so the
  # dispatch does trigger. `release: published` remains as a fallback for
  # manually-published releases. Either way the per-package "already
  # published?" guard makes repeat/overlapping runs no-op cleanly.
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token exchange for npm Trusted Publishing

# Serialize runs so concurrent release events don't race on the same version.
concurrency:
  group: publish-wasm-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # `inputs.package` is only set on workflow_dispatch (where its choice
    # default guarantees it's non-empty); on a release event it's empty, so
    # fall back to all packages that are onboarded on npm (published once +
    # Trusted Publisher configured): lemon-wasm and yuzu-wasm. NOTE: do not
    # branch on `github.event_name` here — inside a called/reused workflow it
    # reports the *caller's* trigger (e.g. `push`), which is exactly how the
    # first automated run skipped both publishes with an empty PACKAGE.
    env:
      PACKAGE: ${{ inputs.package || 'both' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 20 ships npm 10.x.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # wasm-pack resolves --out-dir relative to the crate directory, so we cd
      # into the crate and publish ./pkg from there. The bare name `pkg` would
      # be read as a registry spec, so the path must be `./pkg`.
      #
      # No NODE_AUTH_TOKEN: with a trusted publisher configured on npmjs.com,
      # npm mints a short-lived OIDC token itself and attaches provenance.
      #
      # Idempotent: skip if this exact version is already on npm, so repeated
      # release events (or manual re-runs) don't fail on an existing version.
      - name: Build & publish @citrusquant/lemon-wasm
        if: ${{ env.PACKAGE == 'lemon-wasm' || env.PACKAGE == 'both' }}
        working-directory: crates/lemon-wasm
        run: |
          wasm-pack build --release --target bundler --scope citrusquant --out-dir pkg
          name=$(node -p "require('./pkg/package.json').name")
          version=$(node -p "require('./pkg/package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::notice::$name@$version already published — skipping"
          else
            npm publish ./pkg --access public
          fi

      - name: Build & publish @citrusquant/yuzu-wasm
        if: ${{ env.PACKAGE == 'yuzu-wasm' || env.PACKAGE == 'both' }}
        working-directory: crates/yuzu-wasm
        run: |
          wasm-pack build --release --target bundler --scope citrusquant --out-dir pkg
          name=$(node -p "require('./pkg/package.json').name")
          version=$(node -p "require('./pkg/package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::notice::$name@$version already published — skipping"
          else
            npm publish ./pkg --access public
          fi
