name: lemon binaries

# Cross-compile the `lemon` CLI (crates/lemon-cli) for the common desktop
# targets and attach the binaries to a GitHub Release, so `scripts/install.sh`
# can fetch a prebuilt binary. The installer resolves the current lemon-lang
# version from crates.io and downloads from the matching `lemon-lang-vX.Y.Z`
# release, so the binaries MUST be attached to that tag — which is what
# release-plz.yml's resolve-lemon-tag job passes in.
#
# Runs automatically: release-plz.yml calls this workflow (`workflow_call`)
# right after it cuts a release, passing the lemon-lang tag from that same
# run — release-plz's own GITHUB_TOKEN can't fire `release: published` here
# directly (GitHub's recursion guard), so the caller invokes it in-run
# instead. The other two triggers remain as fallbacks:
#   - workflow_dispatch — run by hand with an existing release tag; the
#     binaries are built from that tag and uploaded to it.
#   - release: published — for manually-published releases (a human token
#     isn't subject to the recursion guard).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach binaries to (e.g. lemon-lang-v0.12.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and attach binaries to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: static musl builds — no glibc dependency, so they run on any
          # distro (old or new), not just the runner's Ubuntu version.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          # macOS: what makes the binary run on old macOS is the deployment
          # target it bakes in (not the builder's OS), so we set that and keep
          # the runner floating. x64 cross-compiles from the arm64 runner.
          - os: macos-latest
            target: x86_64-apple-darwin
            macos_target: "10.15"
          - os: macos-latest
            target: aarch64-apple-darwin
            macos_target: "11.0"
          # Windows: statically link the CRT so no VC++ redistributable is needed.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            rustflags: "-C target-feature=+crt-static"
    steps:
      - uses: actions/checkout@v7
        with:
          # Build from the tagged source so each binary matches its release.
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross, static musl)
        if: matrix.cross
        run: cross build --release -p lemon-cli --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p lemon-cli --target ${{ matrix.target }}
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package binary + checksum
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/lemon${{ matrix.ext }}"
          asset="lemon-${{ matrix.target }}${{ matrix.ext }}"
          cp "$bin" "$asset"
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          asset="lemon-${{ matrix.target }}${{ matrix.ext }}"
          gh release upload "$TAG" "$asset" "$asset.sha256" --clobber --repo "$GITHUB_REPOSITORY"
