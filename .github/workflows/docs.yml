name: Docs

on:
  push:
    branches: [main]

# Build the Astro (Starlight) tutorial site and publish it to GitHub Pages.
# The in-browser playground imports the published @citrusquant/*-wasm packages,
# which Vite bundles at build time, so no Rust/wasm toolchain is needed here.
# The Rust API reference is not built here — it lives on docs.rs (see the site's
# API reference page).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # --- Astro site (playground wasm comes from the npm packages) ------
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install and build site
        working-directory: site
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
