name: Docs

on:
  push:
    branches: [main]

# Build the Astro (Starlight) tutorial site and publish it to GitHub Pages.
# The site embeds an in-browser backtest playground, so we first compile the two
# WASM crates and drop them into the site's public/ tree. The Rust API reference
# is not built here — it lives on docs.rs (see the site's API reference page).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # --- WASM for the playground ---------------------------------------
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - name: Build WASM into the site's public tree
        run: |
          OUT="$PWD/site/public/wasm/lemon" bash scripts/build-lemon-wasm.sh
          OUT="$PWD/site/public/wasm/yuzu"  bash scripts/build-yuzu-wasm.sh

      # --- Astro site ----------------------------------------------------
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install and build site
        working-directory: site
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
